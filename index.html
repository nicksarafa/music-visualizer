<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pigment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: oklch(0.975 0.008 85);
    --paper-deep: oklch(0.955 0.010 85);
    --ink: oklch(0.32 0.015 60);
    --ink-soft: oklch(0.55 0.012 60);
    --hairline: oklch(0.88 0.010 85);
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(120% 90% at 50% -10%, oklch(0.99 0.006 85 / 0.9), transparent 60%),
      radial-gradient(140% 120% at 50% 50%, var(--paper) 55%, var(--paper-deep) 100%);
    font-family: system-ui, -apple-system, sans-serif;
    color: var(--ink);
    user-select: none;
    -webkit-user-select: none;
  }

  canvas.layer { position: fixed; inset: 0; width: 100vw; height: 100vh; }
  #grain  { opacity: 0.5; pointer-events: none; }
  #paint  { mix-blend-mode: multiply; }
  #wet    { pointer-events: none; }

  /* ---------- wordmark ---------- */
  #wordmark {
    position: fixed; top: 28px; left: 32px;
    font-family: "Sorts Mill Goudy", Georgia, serif;
    font-style: italic; font-size: 22px; letter-spacing: 0.02em;
    color: var(--ink);
    opacity: 0.85; transition: opacity 1.2s var(--ease);
    pointer-events: none;
  }
  body.idle #wordmark { opacity: 0.25; }

  /* ---------- status ---------- */
  #status {
    position: fixed; left: 32px; bottom: 26px;
    font-size: 13px; color: var(--ink-soft);
    letter-spacing: 0.01em;
    opacity: 0; transition: opacity 0.9s var(--ease);
    pointer-events: none;
    display: flex; align-items: baseline; gap: 14px;
  }
  #status.visible { opacity: 1; }
  #notes {
    font-family: "Sorts Mill Goudy", Georgia, serif;
    font-style: italic; font-size: 16px; color: var(--ink);
  }

  /* ---------- welcome ---------- */
  #welcome {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px; text-align: center;
    transition: opacity 1.4s var(--ease);
    z-index: 30;
  }
  #welcome.gone { opacity: 0; pointer-events: none; }
  #welcome h1 {
    font-family: "Sorts Mill Goudy", Georgia, serif;
    font-style: italic; font-weight: 400;
    font-size: clamp(34px, 5vw, 52px);
    color: var(--ink);
  }
  #welcome p {
    font-size: 14px; color: var(--ink-soft); max-width: 44ch; line-height: 1.6;
  }
  #welcome .actions { display: flex; gap: 26px; margin-top: 10px; align-items: center; }
  button.quiet {
    background: none; border: none; cursor: pointer;
    font-family: system-ui, sans-serif;
    font-size: 14px; color: var(--ink);
    padding: 10px 22px;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    transition: border-color 0.4s var(--ease), background 0.4s var(--ease);
  }
  button.quiet:hover { border-color: var(--ink-soft); background: oklch(1 0 0 / 0.5); }
  button.bare {
    background: none; border: none; cursor: pointer;
    font-size: 13px; color: var(--ink-soft);
    text-decoration: none;
  }
  button.bare:hover { text-decoration: underline; color: var(--ink); }

  /* ---------- panel toggle ---------- */
  #panelToggle {
    position: fixed; top: 24px; right: 24px; z-index: 40;
    width: 34px; height: 34px; border-radius: 50%;
    background: oklch(0.975 0.008 85 / 0.85);
    border: 1px solid var(--hairline);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.45s var(--ease), border-color 0.3s;
  }
  #panelToggle:hover { border-color: var(--ink-soft); }
  #panelToggle svg { width: 14px; height: 14px; stroke: var(--ink); stroke-width: 1.5; fill: none; }
  body.panel-open #panelToggle { transform: translateX(-292px); }

  /* ---------- panel ---------- */
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: 280px; z-index: 35;
    background: oklch(0.975 0.008 85 / 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-left: 1px solid var(--hairline);
    transform: translateX(100%);
    transition: transform 0.45s var(--ease);
    padding: 84px 28px 28px;
    display: flex; flex-direction: column; gap: 30px;
    overflow-y: auto;
  }
  body.panel-open #panel { transform: translateX(0); }

  .ctl { display: flex; flex-direction: column; gap: 9px; }
  .ctl label {
    font-size: 13px; color: var(--ink-soft);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .ctl label b { font-weight: 450; color: var(--ink); }

  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 20px; background: transparent; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 2px; background: var(--hairline); border-radius: 1px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--ink); margin-top: -6px;
    transition: transform 0.2s var(--ease);
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
  input[type="range"]::-moz-range-track { height: 2px; background: var(--hairline); }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--ink); border: none;
  }

  .rule { border-top: 1px solid var(--hairline); }

  .seg { display: flex; gap: 18px; }
  .seg button {
    background: none; border: none; cursor: pointer;
    font-size: 13px; color: var(--ink-soft); padding: 2px 0;
    border-bottom: 1px solid transparent;
  }
  .seg button.on { color: var(--ink); border-bottom-color: var(--ink); }
  .seg button:hover { color: var(--ink); }

  .panel-actions { display: flex; gap: 20px; margin-top: 2px; }

  #panelTitle {
    position: absolute; top: 30px; left: 28px;
    font-family: "Sorts Mill Goudy", Georgia, serif; font-style: italic;
    font-size: 15px; color: var(--ink-soft);
  }

  #micErr { font-size: 12.5px; color: oklch(0.5 0.12 30); line-height: 1.5; display: none; }
</style>
</head>
<body class="idle">

<canvas id="grain" class="layer"></canvas>
<canvas id="paint" class="layer"></canvas>
<canvas id="wet" class="layer"></canvas>

<div id="wordmark">pigment</div>

<div id="status"><span id="listening">listening</span><span id="notes"></span></div>

<div id="welcome">
  <h1>pigment</h1>
  <p>sing a note or strike a chord, and watch it bloom into paint.
     the same chords always find the same colors.</p>
  <div class="actions">
    <button class="quiet" id="startMic">begin listening</button>
    <button class="bare" id="startDemo">or watch the demo</button>
  </div>
</div>

<button id="panelToggle" title="controls" aria-label="controls">
  <svg viewBox="0 0 24 24"><path d="M4 8h10M18 8h2M4 16h2M10 16h10M14 5.5v5M8 13.5v5"/></svg>
</button>

<div id="panel">
  <div id="panelTitle">controls</div>

  <div class="ctl">
    <label>source</label>
    <div class="seg">
      <button id="srcMic">microphone</button>
      <button id="srcDemo">demo</button>
      <button id="srcOff">quiet</button>
    </div>
    <div id="micErr">microphone unavailable. check the browser permission and try again.</div>
  </div>

  <div class="rule"></div>

  <div class="ctl">
    <label><b>sensitivity</b><span id="v-sens"></span></label>
    <input type="range" id="c-sens" min="0" max="100" value="55">
  </div>
  <div class="ctl">
    <label><b>paint size</b><span id="v-size"></span></label>
    <input type="range" id="c-size" min="0" max="100" value="50">
  </div>
  <div class="ctl">
    <label><b>bleed</b><span id="v-bleed"></span></label>
    <input type="range" id="c-bleed" min="0" max="100" value="50">
  </div>
  <div class="ctl">
    <label><b>drip</b><span id="v-drip"></span></label>
    <input type="range" id="c-drip" min="0" max="100" value="55">
  </div>
  <div class="ctl">
    <label><b>fade</b><span id="v-fade"></span></label>
    <input type="range" id="c-fade" min="0" max="100" value="0">
  </div>

  <div class="rule"></div>

  <div class="ctl">
    <label><b>palette</b><span id="v-hue"></span></label>
    <input type="range" id="c-hue" min="0" max="360" value="0">
  </div>

  <div class="rule"></div>

  <div class="panel-actions">
    <button class="bare" id="btnClear">clear canvas</button>
    <button class="bare" id="btnSave">save painting</button>
  </div>
</div>

<script>
"use strict";

/* ================================================================
   pigment — music into watercolor
   ================================================================ */

const DPR = Math.min(window.devicePixelRatio || 1, 2);

const paintC = document.getElementById("paint");
const wetC   = document.getElementById("wet");
const grainC = document.getElementById("grain");
const pctx = paintC.getContext("2d");
const wctx = wetC.getContext("2d");

let W = 0, H = 0;

function sizeCanvas(c) {
  c.width  = Math.round(innerWidth  * DPR);
  c.height = Math.round(innerHeight * DPR);
}

function makeGrain() {
  sizeCanvas(grainC);
  const g = grainC.getContext("2d");
  const img = g.createImageData(grainC.width, grainC.height);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = 235 + Math.random() * 20;          // pale flecks
    d[i] = v; d[i+1] = v - 2; d[i+2] = v - 6;    // warm bias
    d[i+3] = Math.random() < 0.5 ? 10 : 0;       // sparse, faint
  }
  g.putImageData(img, 0, 0);
}

function resize() {
  // preserve the painting across resizes
  let keep = null;
  if (paintC.width) {
    keep = document.createElement("canvas");
    keep.width = paintC.width; keep.height = paintC.height;
    keep.getContext("2d").drawImage(paintC, 0, 0);
  }
  sizeCanvas(paintC); sizeCanvas(wetC);
  W = paintC.width; H = paintC.height;
  if (keep) pctx.drawImage(keep, 0, 0);
  makeGrain();
}
window.addEventListener("resize", resize);
resize();

/* ---------------- controls ---------------- */

const ctl = {
  sens: 0.55, size: 0.5, bleed: 0.5, drip: 0.55, fade: 0, hue: 0,
};
const fmt = {
  sens:  v => v < 0.33 ? "calm" : v < 0.66 ? "easy" : "eager",
  size:  v => v < 0.33 ? "small" : v < 0.66 ? "medium" : "bold",
  bleed: v => v < 0.33 ? "tight" : v < 0.66 ? "soft" : "wide",
  drip:  v => v < 0.15 ? "none" : v < 0.5 ? "slow" : v < 0.8 ? "steady" : "runny",
  fade:  v => v < 0.05 ? "never" : v < 0.5 ? "slow" : "quick",
  hue:   v => v === 0 ? "true" : "+" + Math.round(v) + "°",
};
function bindSlider(id, key, scale = 0.01) {
  const el = document.getElementById("c-" + id);
  const out = document.getElementById("v-" + id);
  const update = () => {
    ctl[key] = el.value * scale;
    out.textContent = fmt[key](ctl[key]);
  };
  el.addEventListener("input", update);
  update();
}
bindSlider("sens", "sens");
bindSlider("size", "size");
bindSlider("bleed", "bleed");
bindSlider("drip", "drip");
bindSlider("fade", "fade");
bindSlider("hue", "hue", 1);

/* ---------------- color: pitch class -> pigment ---------------- */

const NOTE_NAMES = ["C","C♯","D","E♭","E","F","F♯","G","A♭","A","B♭","B"];
// Circle-of-fifths hue wheel: harmonically close keys get adjacent hues,
// so a C-G-Am-F song paints in one warm family and a key change shifts
// the palette. C anchored at warm crimson.
const HUE_BY_FIFTH = [25, 50, 65, 80, 95, 130, 150, 165, 195, 240, 280, 310];
function pcHue(pc) {
  return (HUE_BY_FIFTH[(pc * 7) % 12] + ctl.hue) % 360;
}

// quality: 1 = major/neutral, shaded softer + cooler for minor
function pigmentColor(pc, alpha, jitterSeed, quality = 1) {
  const hue = pcHue(pc);
  // real pigments: yellows are light, blues and violets sit deeper
  const dh = Math.min(Math.abs(hue - 100), 360 - Math.abs(hue - 100));
  const sunlit = Math.exp(-(dh * dh) / 3200);          // 1 near yellow, 0 far
  const l = 0.60 + sunlit * 0.16
          + Math.sin(jitterSeed * 12.9898) * 0.05 - (1 - quality) * 0.05;
  const c = (0.135 + sunlit * 0.03 + Math.sin(jitterSeed * 78.233) * 0.02)
          * (0.72 + quality * 0.28);
  return `oklch(${l.toFixed(3)} ${c.toFixed(3)} ${hue.toFixed(1)} / ${alpha.toFixed(3)})`;
}
function pigmentEdge(pc, alpha) {
  return `oklch(0.45 0.16 ${pcHue(pc).toFixed(1)} / ${alpha.toFixed(3)})`;
}

/* ---------------- watercolor blob geometry ----------------
   Tyler Hobbs approach: take a rough polygon, recursively
   subdivide edges with gaussian offsets, stack many faint
   layers of re-deformed variants. */

function gauss() {
  let u = 0, v = 0;
  while (!u) u = Math.random();
  while (!v) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function basePolygon(r) {
  const n = 14, pts = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2;
    const rr = r * (0.85 + Math.random() * 0.3);
    pts.push({ x: Math.cos(a) * rr, y: Math.sin(a) * rr, v: 0.3 + Math.random() * 0.7 });
  }
  return pts;
}

function deform(pts, mag, depth) {
  if (depth <= 0) return pts;
  const out = [];
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i], b = pts[(i + 1) % pts.length];
    out.push(a);
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    const v = (a.v + b.v) / 2;
    out.push({
      x: mx + gauss() * mag * v,
      y: my + gauss() * mag * v,
      v: v * (0.8 + Math.random() * 0.4),
    });
  }
  return deform(out, mag / 2, depth - 1);
}

function tracePoly(ctx, pts, x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x + pts[0].x * s, y + pts[0].y * s);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(x + pts[i].x * s, y + pts[i].y * s);
  ctx.closePath();
}

/* ---------------- paint world ---------------- */

const blooms = [];   // animating washes
const drips = [];    // descending runs
const glosses = [];  // wet specular highlights
let lastStrikeX = -1e5, lastStrikeY = -1e5;

function spawnStrike(pcs, level) {
  // pcs: [{pc, w}] sorted by weight; level 0..1 loudness
  // minor chords (minor third over the root, no major third) paint softer
  const root = pcs[0].pc;
  const hasMin3 = pcs.some(p => p.pc === (root + 3) % 12);
  const hasMaj3 = pcs.some(p => p.pc === (root + 4) % 12);
  const quality = hasMin3 && !hasMaj3 ? 0 : 1;

  // center-weighted random placement, nudged away from the previous strike
  // so successive chords spread across the canvas instead of piling up
  const margin = 0.12;
  let x = 0, y = 0;
  const minDist = Math.min(W, H) * 0.22;
  for (let attempt = 0; attempt < 4; attempt++) {
    x = Math.max(W * margin, Math.min(W * (1 - margin), W * (0.5 + gauss() * 0.2)));
    y = Math.max(H * margin, Math.min(H * (1 - margin), H * (0.46 + gauss() * 0.17)));
    const dx = x - lastStrikeX, dy = y - lastStrikeY;
    if (dx * dx + dy * dy > minDist * minDist) break;
  }
  lastStrikeX = x; lastStrikeY = y;

  const sizeBase = (0.035 + ctl.size * 0.075) * Math.min(W, H);
  const total = pcs.reduce((s, p) => s + p.w, 0) || 1;

  pcs.forEach((p, i) => {
    const share = p.w / total;
    // root dominates; upper chord tones are smaller washes bleeding out of it
    const r = sizeBase * (i === 0 ? 0.95 : 0.45 + share * 0.5) * (0.75 + level * 0.5);
    const a = Math.random() * Math.PI * 2;
    const d = i === 0 ? 0 : sizeBase * (0.5 + Math.random() * 0.35);
    spawnBloom(x + Math.cos(a) * d, y + Math.sin(a) * d, r, p.pc, level, i * 140, quality);
  });
}

function spawnBloom(x, y, r, pc, level, delay, quality = 1) {
  const seed = Math.random();
  // washes are rarely perfect circles: gentle elliptical bias per bloom
  const ax = 0.85 + Math.random() * 0.35;
  const poly = deform(basePolygon(r), r * 0.15, 4)
    .map(p => ({ x: p.x * ax, y: p.y * (2 - ax) * 0.85, v: p.v }));
  const layers = Math.round(16 + ctl.bleed * 22);
  blooms.push({
    x, y, r, pc, seed, poly, layers, quality,
    born: performance.now() + delay,
    life: 1400 + ctl.bleed * 900,
    drawn: 0,
  });
  glosses.push({ x, y, r: r * 0.8, born: performance.now() + delay, life: 7000 });
  // a heavy drop occasionally breaks from the underside and runs
  if (ctl.drip > 0.15 && Math.random() < 0.28 + ctl.drip * 0.35) {
    drips.push({
      x: x + (Math.random() - 0.5) * r * 0.6,
      y: y + r * (0.2 + Math.random() * 0.3),   // starts inside the wash
      w: (2.6 + Math.random() * 2.4 + level * 2.5) * DPR,
      pc, seed: Math.random(),
      budget: r * (0.8 + ctl.drip * 3.2) * (0.6 + Math.random() * 0.8),
      born: performance.now() + delay + 500 + Math.random() * 900,
      phase: Math.random() * 100,
      drift: (Math.random() - 0.5) * 0.12,       // slight persistent lean
    });
  }
}

function drawBloomLayers(b, target) {
  while (b.drawn < target) {
    const s = 0.55 + (b.drawn / b.layers) * 0.5;
    const variant = deform(b.poly.map(p => ({ ...p })), b.r * 0.065, 2);
    pctx.fillStyle = pigmentColor(b.pc, 0.028 + 0.02 * (1 - b.drawn / b.layers), b.seed + b.drawn, b.quality);
    tracePoly(pctx, variant, b.x, b.y, s);
    pctx.fill();
    b.drawn++;
  }
}

function stepBlooms(now) {
  for (let i = blooms.length - 1; i >= 0; i--) {
    const b = blooms[i];
    const t = (now - b.born) / b.life;
    if (t < 0) continue;
    if (t >= 1) {
      // finish any layers missed during throttled frames, then darken the edge
      drawBloomLayers(b, b.layers);
      const edge = deform(b.poly.map(p => ({ ...p })), b.r * 0.05, 2);
      pctx.strokeStyle = pigmentEdge(b.pc, 0.05);
      pctx.lineWidth = 1.1 * DPR;
      tracePoly(pctx, edge, b.x, b.y, 1.02);
      pctx.stroke();
      blooms.splice(i, 1);
      continue;
    }
    // ease-out growth: fast birth, slow settle
    const eased = 1 - Math.pow(1 - t, 3);
    drawBloomLayers(b, Math.floor(eased * b.layers));
  }
}

function stepDrips(now, dt) {
  for (let i = drips.length - 1; i >= 0; i--) {
    const d = drips[i];
    if (now < d.born) continue;
    if (d.budget <= 0 || d.w < 1.2 * DPR) {
      // the run ends in a slightly swollen droplet
      for (let k = 0; k < 6; k++) {
        pctx.fillStyle = pigmentColor(d.pc, 0.05, d.seed + k);
        pctx.beginPath();
        pctx.arc(d.x + gauss() * 0.5, d.y + d.w * 0.3 + gauss() * 0.5,
                 d.w * (1.15 - k * 0.06), 0, Math.PI * 2);
        pctx.fill();
      }
      drips.splice(i, 1);
      continue;
    }
    // slow gravity with stick-slip: paint hesitates, then runs
    const speed = (9 + ctl.drip * 30) * DPR;
    const slip = 0.4 + 0.6 * Math.sin(now / 1300 + d.phase) ** 2;
    const dy = speed * slip * dt;
    const nx = d.x + d.drift * dy + Math.sin(now / 2400 + d.phase * 3) * 0.05 * DPR;
    const ny = d.y + dy;
    // taper only over the last third of the run
    const frac = d.budget / (d.budget0 || (d.budget0 = d.budget));
    const wNow = d.w * (frac > 0.33 ? 1 : 0.55 + frac * 1.36);
    pctx.strokeStyle = pigmentColor(d.pc, 0.038, d.seed);
    pctx.lineWidth = wNow;
    pctx.lineCap = "round";
    pctx.beginPath();
    pctx.moveTo(d.x, d.y);
    pctx.lineTo(nx, ny);
    pctx.stroke();
    d.x = nx; d.y = ny;
    d.budget -= dy;
  }
}

function stepGloss(now) {
  wctx.clearRect(0, 0, W, H);
  for (let i = glosses.length - 1; i >= 0; i--) {
    const g = glosses[i];
    const t = (now - g.born) / g.life;
    if (t < 0) continue;
    if (t >= 1) { glosses.splice(i, 1); continue; }
    const a = 0.16 * (1 - t) * (t < 0.1 ? t / 0.1 : 1);
    const gx = g.x - g.r * 0.25, gy = g.y - g.r * 0.3;
    const grad = wctx.createRadialGradient(gx, gy, 0, gx, gy, g.r * 0.9);
    grad.addColorStop(0, `oklch(1 0 0 / ${a.toFixed(3)})`);
    grad.addColorStop(1, "oklch(1 0 0 / 0)");
    wctx.fillStyle = grad;
    wctx.beginPath();
    wctx.arc(gx, gy, g.r * 0.9, 0, Math.PI * 2);
    wctx.fill();
  }
}

let fadeAcc = 0;
function stepFade(dt) {
  if (ctl.fade < 0.05) return;
  fadeAcc += dt * ctl.fade;
  if (fadeAcc > 0.35) {           // fade in slow discrete breaths
    pctx.save();
    pctx.globalCompositeOperation = "destination-out";
    pctx.fillStyle = "rgba(0,0,0,0.012)";
    pctx.fillRect(0, 0, W, H);
    pctx.restore();
    fadeAcc = 0;
  }
}

/* ---------------- audio analysis ---------------- */

const AC = window.AudioContext || window.webkitAudioContext;
let ac = null, analyser = null, srcNode = null;
let freqData = null, prevMag = null, timeData = null;
let source = "off";            // "mic" | "demo" | "off"
let micStream = null;

const status = document.getElementById("status");
const notesEl = document.getElementById("notes");
const listeningEl = document.getElementById("listening");

function ensureCtx() {
  if (!ac) {
    ac = new AC();
    analyser = ac.createAnalyser();
    analyser.fftSize = 8192;
    analyser.smoothingTimeConstant = 0.4;
    freqData = new Float32Array(analyser.frequencyBinCount);
    timeData = new Float32Array(analyser.fftSize);
    prevMag = new Float32Array(analyser.frequencyBinCount);
  }
  if (ac.state === "suspended") ac.resume();
}

async function startMic() {
  ensureCtx();
  stopDemo();
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
    });
  } catch (e) {
    document.getElementById("micErr").style.display = "block";
    setSource("off");
    return false;
  }
  document.getElementById("micErr").style.display = "none";
  if (srcNode) srcNode.disconnect();
  srcNode = ac.createMediaStreamSource(micStream);
  srcNode.connect(analyser);
  setSource("mic");
  return true;
}

function stopMic() {
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (srcNode) { srcNode.disconnect(); srcNode = null; }
}

/* ---- demo: a slow strummed progression through the same analyser ---- */

let demo = { on: false, gain: null, nextTime: 0, step: 0 };
const DEMO_CHORDS = [
  [48, 55, 60, 64],       // C
  [43, 55, 59, 62],       // G
  [45, 52, 57, 60],       // Am
  [41, 53, 57, 60],       // F
  [48, 55, 60, 64],       // C
  [45, 52, 57, 60],       // Am
  [50, 57, 62, 65],       // Dm
  [43, 55, 59, 62],       // G
];
function pluck(midi, when, vel) {
  const f = 440 * Math.pow(2, (midi - 69) / 12);
  const osc = ac.createOscillator();
  osc.type = "triangle";
  osc.frequency.value = f;
  const g = ac.createGain();
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(vel, when + 0.015);
  g.gain.exponentialRampToValueAtTime(0.001, when + 2.6);
  osc.connect(g); g.connect(demo.gain);
  osc.start(when); osc.stop(when + 2.8);
}

// schedule strums ahead on the audio clock so playback survives
// tab throttling and stays rhythmically steady
function scheduleDemo() {
  if (!demo.on) return;
  while (demo.nextTime < ac.currentTime + 6) {
    const chord = DEMO_CHORDS[demo.step % DEMO_CHORDS.length];
    demo.step++;
    const t = demo.nextTime;
    chord.forEach((m, i) => pluck(m, t + i * 0.045, 0.16 + Math.random() * 0.06));
    demo.nextTime = t + 2.4 + Math.random() * 0.5;
  }
}

function startDemo() {
  ensureCtx();
  stopMic();
  if (!demo.gain) {
    demo.gain = ac.createGain();
    demo.gain.gain.value = 1;
    demo.gain.connect(analyser);
    const out = ac.createGain();
    out.gain.value = 0.5;                 // audible but gentle
    demo.gain.connect(out);
    out.connect(ac.destination);
  }
  demo.on = true;
  demo.step = 0;
  demo.nextTime = ac.currentTime + 0.1;
  scheduleDemo();
  setSource("demo");
}

function stopDemo() {
  demo.on = false;
}

function setSource(s) {
  source = s;
  document.getElementById("srcMic").classList.toggle("on", s === "mic");
  document.getElementById("srcDemo").classList.toggle("on", s === "demo");
  document.getElementById("srcOff").classList.toggle("on", s === "off");
  listeningEl.textContent = s === "mic" ? "listening" : s === "demo" ? "demo playing" : "quiet";
  status.classList.toggle("visible", s !== "off");
}

/* ---- chroma + onset ---- */

let lastOnset = 0;
let lastSpawn = 0;
let lastDominantPc = -1;
let fluxHistory = [];
let statusFadeTimer = null;

function analyse(now) {
  if (!analyser || source === "off") return;

  analyser.getFloatFrequencyData(freqData);
  analyser.getFloatTimeDomainData(timeData);

  // loudness
  let sum = 0;
  for (let i = 0; i < timeData.length; i += 4) sum += timeData[i] * timeData[i];
  const rms = Math.sqrt(sum / (timeData.length / 4));
  const level = Math.min(1, rms * 9);

  const binW = ac.sampleRate / analyser.fftSize;
  const lo = Math.floor(70 / binW), hi = Math.min(Math.floor(1400 / binW), freqData.length - 1);

  // spectral flux (positive changes only) + chroma in one pass
  let flux = 0;
  const chroma = new Float32Array(12);
  for (let i = lo; i <= hi; i++) {
    const db = freqData[i];
    const mag = db < -90 ? 0 : Math.pow(10, db / 20);
    const dInc = mag - prevMag[i];
    if (dInc > 0) flux += dInc;
    prevMag[i] = mag;
    if (mag > 0) {
      const f = i * binW;
      const midi = 69 + 12 * Math.log2(f / 440);
      const pc = ((Math.round(midi) % 12) + 12) % 12;
      // weight fundamentals over high harmonics
      chroma[pc] += mag * mag * (1 / (1 + (f / 500)));
    }
  }

  fluxHistory.push(flux);
  if (fluxHistory.length > 45) fluxHistory.shift();
  const mean = fluxHistory.reduce((a, b) => a + b, 0) / fluxHistory.length;
  const sd = Math.sqrt(fluxHistory.reduce((a, b) => a + (b - mean) ** 2, 0) / fluxHistory.length);
  const gate = 0.015 + (1 - ctl.sens) * 0.05;      // level gate
  const thresh = mean + sd * (2.6 - ctl.sens * 1.7);

  // dominant pitch classes
  let max = 0;
  for (let i = 0; i < 12; i++) if (chroma[i] > max) max = chroma[i];
  const pcs = [];
  if (max > 0) {
    for (let i = 0; i < 12; i++) {
      if (chroma[i] > max * 0.35) pcs.push({ pc: i, w: chroma[i] });
    }
    pcs.sort((a, b) => b.w - a.w);
    pcs.length = Math.min(pcs.length, 3);   // restraint: at most three hues per strike
  }

  const audible = level > gate;
  const onset = flux > thresh && audible && now - lastOnset > 180;
  const dominant = pcs.length ? pcs[0].pc : -1;
  const pcChanged = dominant !== -1 && dominant !== lastDominantPc && audible && now - lastSpawn > 700;

  if ((onset || pcChanged) && pcs.length) {
    lastOnset = onset ? now : lastOnset;
    lastSpawn = now;
    lastDominantPc = dominant;
    spawnStrike(pcs, level);
    notesEl.textContent = pcs.map(p => NOTE_NAMES[p.pc]).join(" · ");
    document.body.classList.remove("idle");
    clearTimeout(statusFadeTimer);
    statusFadeTimer = setTimeout(() => {
      notesEl.textContent = "";
      document.body.classList.add("idle");
    }, 2600);
  }
}

/* ---------------- main loop ---------------- */

let lastFrame = performance.now();
function frame(now) {
  const raw = (now - lastFrame) / 1000;
  lastFrame = now;
  if (demo.on) scheduleDemo();
  analyse(now);
  stepBlooms(now);
  // substep so drips stay smooth (and correct) across throttled frames;
  // simulate at most 1.5s of catch-up per real frame
  let remaining = Math.min(raw, 1.5);
  let simNow = now - remaining * 1000;
  while (remaining > 0) {
    const dt = Math.min(remaining, 1 / 60);
    simNow += dt * 1000;
    stepDrips(simNow, dt);
    stepFade(dt);
    remaining -= dt;
  }
  stepGloss(now);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* debug handle for automated visual testing */
window.PIG = {
  spawnStrike, spawnBloom, blooms, drips, glosses, ctl,
  clear: () => pctx.clearRect(0, 0, W, H),
  // synchronously simulate `ms` of painting time (for tests / throttled tabs)
  render(ms) {
    let vnow = performance.now();
    const end = vnow + ms;
    while (vnow < end) {
      vnow += 1000 / 60;
      stepBlooms(vnow);
      stepDrips(vnow, 1 / 60);
      stepFade(1 / 60);
    }
    stepGloss(performance.now());
  },
  // synchronously run the LIVE pipeline (audio analysis included) for `ms`,
  // busy-waiting between analysis frames — test-only, blocks the main thread
  listen(ms) {
    const end = performance.now() + ms;
    let spawns = 0;
    const before = () => blooms.length + drips.length;
    while (performance.now() < end) {
      if (demo.on) scheduleDemo();
      const now = performance.now();
      const n0 = before();
      analyse(now);
      if (before() > n0) spawns++;
      stepBlooms(now);
      stepDrips(now, 1 / 30);
      const until = now + 33;
      while (performance.now() < until) { /* busy-wait */ }
    }
    return spawns;
  },
};

/* ---------------- ui wiring ---------------- */

const welcome = document.getElementById("welcome");
function dismissWelcome() { welcome.classList.add("gone"); }

document.getElementById("startMic").addEventListener("click", async () => {
  const ok = await startMic();
  dismissWelcome();
  if (!ok) document.body.classList.add("panel-open");
});
document.getElementById("startDemo").addEventListener("click", () => {
  startDemo();
  dismissWelcome();
});

document.getElementById("panelToggle").addEventListener("click", () => {
  document.body.classList.toggle("panel-open");
});

document.getElementById("srcMic").addEventListener("click", startMic);
document.getElementById("srcDemo").addEventListener("click", startDemo);
document.getElementById("srcOff").addEventListener("click", () => {
  stopMic(); stopDemo(); setSource("off");
});

document.getElementById("btnClear").addEventListener("click", () => {
  pctx.clearRect(0, 0, W, H);
  blooms.length = 0; drips.length = 0; glosses.length = 0;
});

document.getElementById("btnSave").addEventListener("click", () => {
  const out = document.createElement("canvas");
  out.width = W; out.height = H;
  const o = out.getContext("2d");
  o.fillStyle = "#f7f4ec";                 // paper
  o.fillRect(0, 0, W, H);
  o.drawImage(grainC, 0, 0);
  o.globalCompositeOperation = "multiply";
  o.drawImage(paintC, 0, 0);
  const a = document.createElement("a");
  a.download = "pigment.png";
  a.href = out.toDataURL("image/png");
  a.click();
});
</script>
